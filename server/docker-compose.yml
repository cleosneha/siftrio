services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: siftrio-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_project_memory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: siftrio-postgres
      ADMINER_DEFAULT_USERNAME: postgres
      ADMINER_DEFAULT_DB: ai_project_memory
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
